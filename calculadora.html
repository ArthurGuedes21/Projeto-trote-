        <title> Trote Solidário </title>

    </head>
    <body>
        <nav class="menu"> <!-- Menu de navegação -->
            <div class="menu-container">
                <a href="index.html" class="menu-logo"> Trote 2026 </a>
                <ul class="lista">
                    <li> <a href="index.html"> Início </a> </li>

                </ul>
            </div>
        </nav>
        <main class="principal">
          <section class="calculadora">
            <h3>🧮Simulador de pontos</h3>
            <div class="form-grid">
                <div class="form-group">
                <label>Arroz(5KG) - 10 pontos</label>
                <input type="number" id="qtdeArroz" min="0">
                </div>
                <div class="form-group">
                <label>Feijão(2KG) - 8 pontos</label> <!-- rotulo da caixa de entrada-->
                <input type="number" id="qtdeFeijao" min="0"> <!--Caixinha de entrada-->
                </div>
            </div>
            <button onclick="calcular()"> Calcular total da equipe</button><!--quando esse botao for clicado,a funçao calcular() sera chamada no javascript-->
            <div id="resultado" class="resultado-box">
                Pontuaçao total: 0 pontos
            </div>
          </section>
        </main>
        <footer>
                <p>Coordenação Trote Solidário 2026: trotesolidario@facef.br</p>
                <p>Uni-FACEF - Centro Universitário Municipal de Franca</p>
        </footer>
        <script> <!-- programar javascript--> 
        function calcular(){
            //Number é uma funçao que converte texto em numero
            // recupera o valor informado no elemento com id qtdearroz
            // JS é uma linguagem nao tipada (sem tipo de dados)
            let qtdeArroz = Number(document.getElementById("qtdeArroz").value)
            // recupera o valor informado no elemento com id qtdefeijao
            let qtdeFeijao = Number(document.getElementById("qtdeFeijao").value)
            //calcula o valor total dos produtos
            let pontos = (qtdeArroz * 10) + (qtdeFeijao * 8)
            //exibe o resultado para o usuario
            document.getElementById("resultado").innerText = "Pontuaçao total: " + pontos

        }
        </script>
    </body>
</html>
